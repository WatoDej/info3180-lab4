{% extends 'base.html' %}
{% block main %}

    <h1 class="page-header">Uploaded Images</h1>
    <div class="files-row">
        {% for filename in filenames %}
            <img src="{{ url_for('get_image', filename=filename) }}" alt="{{ filename }}" class="img-thumbnail">
        {% endfor %}
    </div>


{% endblock %}

{% block styles %}
<style>
    .files-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        padding: 20px;
    }

    .grid-item img {
        width: 100%;
        height: 250px;
        object-fit: cover;
    }
</style>
{% endblock %}
